<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Segoe UI',system-ui,sans-serif">
<style>
  text{fill:#FFFFFF}
  .muted{fill:#9BA0A8}
  .mono{font-family:Consolas,'Courier New',monospace}
  @keyframes hdr{0%,3%{opacity:0;transform:translateY(-6px)}9%,93%{opacity:1;transform:translateY(0)}100%{opacity:0}}
  @keyframes code{0%,4%{opacity:0}12%,93%{opacity:1}100%{opacity:0}}
  @keyframes beam{0%,16%{opacity:0;transform:translateY(0)}18%{opacity:1}44%{opacity:1;transform:translateY(178px)}47%,100%{opacity:0;transform:translateY(178px)}}
  @keyframes pop{0%,32%{opacity:0;transform:scale(.7)}37%{opacity:1;transform:scale(1.06)}40%,92%{opacity:1;transform:scale(1)}100%{opacity:0}}
  @keyframes pop2{0%,38%{opacity:0;transform:scale(.7)}43%{opacity:1;transform:scale(1.06)}46%,92%{opacity:1;transform:scale(1)}100%{opacity:0}}
  @keyframes pop3{0%,44%{opacity:0;transform:scale(.7)}49%{opacity:1;transform:scale(1.06)}52%,92%{opacity:1;transform:scale(1)}100%{opacity:0}}
  @keyframes ring{0%,52%{stroke-dashoffset:214}66%,92%{stroke-dashoffset:18}100%{stroke-dashoffset:214}}
  @keyframes sc{0%,58%{opacity:0}66%,92%{opacity:1}100%{opacity:0}}
  @keyframes vd{0%,70%{opacity:0}78%,92%{opacity:1}100%{opacity:0}}
  #hdr{animation:hdr 7s infinite ease-out}
  #code{animation:code 7s infinite}
  #beam{animation:beam 7s infinite ease-in-out}
  #c1{animation:pop 7s infinite;transform-box:fill-box;transform-origin:left center}
  #c2{animation:pop2 7s infinite;transform-box:fill-box;transform-origin:left center}
  #c3{animation:pop3 7s infinite;transform-box:fill-box;transform-origin:left center}
  #ring{animation:ring 7s infinite ease-out}
  #score{animation:sc 7s infinite}
  #verdict{animation:vd 7s infinite}
</style>
<rect x="18" y="14" width="764" height="422" rx="18" fill="#0B0B0F" stroke="#25272E" stroke-width="1.5"/>

<g id="hdr">
  <rect x="40" y="28" width="46" height="46" rx="12" fill="#000" stroke="#25272E"/>
  <path d="M52 40 L74 40 Q77 40 77 43 L77 56 C77 65 63 71 63 71 C63 71 49 65 49 56 L49 43 Q49 40 52 40 Z" fill="#FFFFFF"/>
  <path d="M56.5 54.5 L61.5 59.5 L70 49.5" fill="none" stroke="#29D17F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="46" font-size="23" font-weight="700">VibeGuard</text>
  <text x="101" y="65" font-size="13" class="muted">바이브코딩 보안 스캐너 · AI 생성 코드의 취약점을 잡아냅니다</text>
</g>

<g id="code">
  <rect x="44" y="108" width="150" height="11" rx="3" fill="#2A2E37"/>
  <rect x="44" y="130" width="250" height="11" rx="3" fill="#23262E"/>
  <rect x="44" y="152" width="210" height="11" rx="3" fill="#2E1A20"/>
  <rect x="44" y="174" width="280" height="11" rx="3" fill="#23262E"/>
  <rect x="44" y="196" width="180" height="11" rx="3" fill="#2E1A20"/>
  <rect x="44" y="218" width="240" height="11" rx="3" fill="#23262E"/>
  <rect x="44" y="240" width="160" height="11" rx="3" fill="#2A2E37"/>
  <rect x="44" y="262" width="220" height="11" rx="3" fill="#2E2418"/>
</g>

<g id="beam">
  <rect x="40" y="100" width="300" height="16" rx="3" fill="#29D17F" opacity="0.16"/>
  <rect x="40" y="107" width="300" height="2.5" rx="1" fill="#29D17F"/>
</g>

<g id="c1" transform="translate(360,124)">
  <rect width="372" height="40" rx="10" fill="#15161A" stroke="#25272E"/>
  <rect width="4" height="40" rx="2" fill="#FF4D4D"/>
  <circle cx="22" cy="20" r="6" fill="#FF4D4D"/>
  <text x="38" y="17" font-size="13" font-weight="700" fill="#FF4D4D">치명적</text>
  <text x="38" y="32" font-size="12.5">eval()로 외부 입력 실행 — 원격 코드 실행</text>
  <text x="330" y="25" font-size="11" class="mono muted">VG-EXEC</text>
</g>

<g id="c2" transform="translate(360,172)">
  <rect width="372" height="40" rx="10" fill="#15161A" stroke="#25272E"/>
  <rect width="4" height="40" rx="2" fill="#FF8A3D"/>
  <circle cx="22" cy="20" r="6" fill="#FF8A3D"/>
  <text x="38" y="17" font-size="13" font-weight="700" fill="#FF8A3D">높음</text>
  <text x="38" y="32" font-size="12.5">MD5로 비밀번호 해시 — 취약한 암호</text>
  <text x="322" y="25" font-size="11" class="mono muted">VG-CRYPTO</text>
</g>

<g id="c3" transform="translate(360,220)">
  <rect width="372" height="40" rx="10" fill="#15161A" stroke="#25272E"/>
  <rect width="4" height="40" rx="2" fill="#C8A2FF"/>
  <circle cx="22" cy="20" r="6" fill="#C8A2FF"/>
  <text x="38" y="17" font-size="13" font-weight="700" fill="#C8A2FF">슬롭스쿼팅</text>
  <text x="38" y="32" font-size="12.5">'reqeusts' — 환각·오타 패키지(→ requests)</text>
  <text x="330" y="25" font-size="11" class="mono muted">VG-SLOP</text>
</g>

<g id="score" transform="translate(360,300)">
  <circle cx="34" cy="56" r="34" fill="none" stroke="#25272E" stroke-width="7"/>
  <circle id="ring" cx="34" cy="56" r="34" fill="none" stroke="#FF4D4D" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="214"
          transform="rotate(-90 34 56)"/>
  <text x="34" y="55" font-size="26" font-weight="800" text-anchor="middle">0</text>
  <text x="34" y="71" font-size="10" class="muted" text-anchor="middle">/ 100</text>
  <text x="86" y="44" font-size="15" font-weight="700">보안 점수 0점 · 등급 F</text>
  <text x="86" y="66" font-size="13" class="muted">스캔 3개 파일 · 발견 19건 (치명 4 · 높음 8 · 중간 6 · 낮음 1)</text>
</g>

<text id="verdict" x="400" y="408" font-size="15" font-weight="700" fill="#FF4D4D" text-anchor="middle">치명적 문제가 있습니다 — 배포 전에 반드시 고치세요</text>
</svg>
