name: Build standalone executables

# 태그(vX.Y.Z) 푸시 시 Windows/macOS/Linux 단일 실행파일을 빌드해
# GitHub Releases 에 첨부한다. 비개발자는 Python 없이 받아서 더블클릭/드래그만 하면 된다.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: VibeGuard-windows.exe
            src: dist/VibeGuard.exe
          - os: macos-latest
            asset: VibeGuard-macos
            src: dist/VibeGuard
          - os: ubuntu-latest
            asset: VibeGuard-linux
            src: dist/VibeGuard
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e . pyinstaller
      - name: Build single-file executable
        run: pyinstaller --onefile --name VibeGuard packaging/vibeguard_app.py
      - name: Rename asset
        shell: bash
        run: |
          mkdir -p out
          mv "${{ matrix.src }}" "out/${{ matrix.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
